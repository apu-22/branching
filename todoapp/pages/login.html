<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Todo App</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="navbar">
    <h1 class="logo">📝 Todo App</h1>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="todo.html">My Todos</a>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <h2>🔐 Login</h2>

      <div id="error-msg" class="alert alert-error" style="display:none;"></div>

      <div class="form-group">
        <label for="username">নাম লেখো</label>
        <input type="text" id="username" placeholder="তোমার নাম" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="যেকোনো কিছু লেখো" />
      </div>

      <button class="btn" onclick="handleLogin()" style="width:100%; margin-top:8px;">
        Login করো →
      </button>

      <p style="margin-top:16px; font-size:13px; color:#888; text-align:center;">
        Demo: যেকোনো নাম দিলেই login হবে (password: 1234)
      </p>
    </div>
  </main>

  <script src="../app.js"></script>
  <script>
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');

      // Simple validation
      if (!username) {
        errorMsg.textContent = 'নাম লেখো!';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== '1234') {
        errorMsg.textContent = 'Password ভুল! (hint: 1234)';
        errorMsg.style.display = 'block';
        return;
      }

      // Login success
      errorMsg.style.display = 'none';
      setLoggedInUser(username);
      window.location.href = 'todo.html';
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
